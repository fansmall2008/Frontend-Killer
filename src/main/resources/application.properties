# 服务器端口
server.port=8080

# 静态资源配置
spring.web.resources.static-locations=classpath:/static/,file:./,file:./media/

# 数据库连接配置
spring.datasource.url=jdbc:h2:file:/data/database.db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# HikariCP连接池配置
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# SQL初始化配置
spring.sql.init.schema-locations=classpath:sql/init.sql
spring.sql.init.mode=always

# MyBatis配置
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.gamelist.model

# 日志配置
logging.level.com.gamelist=INFO
logging.level.org.mybatis=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.charset.console=UTF-8

# 文件日志配置
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# H2数据库控制台配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- 1. 配置上传临时文件目录（解决无权限问题）---
# 用于存放上传过程中的临时文件
spring.servlet.multipart.location=/data

# --- 2. 配置Tomcat基础工作目录（可选，用于隔离）---
# 为Tomcat运行时文件指定一个专属目录
server.tomcat.basedir=/data

# --- 3. 配置静态资源映射（如果需要HTTP访问上传的文件）---
# 将外部目录添加为静态资源位置，使其可通过URL访问
spring.resources.static-locations=classpath:/static/,file:/data

# --- 4. （可选）调整文件上传大小限制 ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- 5. 自定义路径配置 ---
# 规则文件目录（导入模板和导出规则）
app.rules.directory=/data/rules
# 导入模板目录
app.import.templates.path=/data/rules/import-templates
# 导出规则目录
app.export.rules.path=/data/rules/export-rules
# 输入目录（导入源文件）
app.input.directory=/data/input
# 输出目录（导出目标文件）
app.output.directory=/data/output