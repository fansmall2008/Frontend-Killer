<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 前端杀手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            background-attachment: fixed;
        }
        
        /* 游戏风格背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(50, 100, 200, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(200, 50, 100, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 语言选择器样式 */
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        .language-selector select {
            padding: 8px 12px;
            border: 1px solid #00ffff;
            border-radius: 4px;
            background: #1a1a2e;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        
        .language-selector select:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        /* 游戏风格标题 */
        .header {
            text-align: center;
            margin: 60px 0 40px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            animation: scan 4s linear infinite;
        }
        
        @keyframes scan {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .header-content {
            position: relative;
            z-index: 2;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            font-family: 'Arial Black', 'Impact', sans-serif;
            letter-spacing: 2px;
        }
        
        .header p {
            font-size: 1.2rem;
            color: #00ffff;
            margin-bottom: 10px;
        }
        
        /* 按钮样式 */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #00ffff, #0088ff);
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Consolas', 'Courier New', monospace;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
            cursor: pointer;
        }
        
        .btn:hover {
            background: linear-gradient(45deg, #ff00ff, #ff0088);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 255, 0.4);
        }
        
        .back-btn {
            margin-bottom: 20px;
            width: fit-content;
        }
        
        /* 危险按钮样式 */
        .danger-btn {
            background: linear-gradient(45deg, #ff0055, #ff5500);
            color: #fff;
        }
        
        .danger-btn:hover {
            background: linear-gradient(45deg, #ff5500, #ff0055);
        }
        
        /* 设置区域样式 */
        .settings-section {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .settings-section:hover {
            border-color: #00ffff;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        
        .settings-section h2 {
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        
        /* 状态标签样式 */
        .status-badge {
            padding: 0.35em 0.65em;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .status-running {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .status-completed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }
        .status-failed {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border-color: #e74c3c;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
        }
        .status-pending {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border-color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }
        
        /* 进度条样式 */
        .progress {
            height: 10px;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        
        /* 任务卡片样式 */
        .task-card {
            margin-bottom: 15px;
            border: 2px solid #333;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.1);
            background: rgba(26, 26, 46, 0.9);
            transition: all 0.3s ease;
        }
        
        .task-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .task-card-header {
            padding: 1rem;
            border-bottom: 2px solid #333;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 0.5rem 0.5rem 0 0;
        }
        
        .task-card-body {
            padding: 1rem;
        }
        
        .task-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: #888;
        }
        
        /* 日志内容样式 */
        .log-content {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            color: #ddd;
        }
        
        /* 页脚样式 */
        .footer {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
            color: #888;
        }
        
        .footer p {
            margin: 5px 0;
        }
        
        .version-info {
            color: #00ffff;
            font-weight: bold;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .header {
                margin: 40px 0 30px;
                padding: 30px 15px;
            }
            
            .language-selector {
                top: 10px;
                right: 10px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
        
        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
            border: 2px solid transparent;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification-success {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.95), rgba(39, 174, 96, 0.95));
            border-color: #2ecc71;
            color: white;
        }
        
        .notification-error {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.95), rgba(192, 57, 43, 0.95));
            border-color: #e74c3c;
            color: white;
        }
        
        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .notification-icon {
            font-size: 20px;
        }
        
        .notification-text {
            flex: 1;
        }
        
        .notification-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .notification-close {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .notification-close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 语言选择器 -->
    <div class="language-selector">
        <select id="languageSelect">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
            <option value="ja-JP">日本語</option>
        </select>
    </div>
    
    <div class="container">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <a href="index.html" class="btn back-btn" data-i18n="back_to_home">返回首页</a>
            <a href="log-viewer.html" class="btn" data-i18n="log_viewer_btn">日志查看器</a>
        </div>
        
        <div class="header">
            <h1 data-i18n="task_management_title">任务管理</h1>
            <p data-i18n="task_management_desc">实时监控后台任务执行情况</p>
        </div>
        
        <div class="settings-section">
            <h2 data-i18n="task_list">任务列表</h2>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="card-title" data-i18n="task_list">任务列表</h5>
                <button id="clearAllBtn" class="btn danger-btn" data-i18n="clear_all_tasks">清空所有任务</button>
            </div>
            
            <div id="taskList" class="space-y-4">
                <!-- 任务卡片将通过JavaScript动态添加 -->
                <div class="text-center text-muted py-8">
                    <div class="spinner-border mb-2" role="status">
                        <span class="visually-hidden" data-i18n="loading">加载中...</span>
                    </div>
                    <p data-i18n="loading_tasks">正在加载任务列表...</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p data-i18n="copyright">© 2024 前端杀手 | 模拟游戏元数据管理平台</p>
            <p class="version-info" data-i18n="version">版本：1.0 beta</p>
        </div>
    </div>
    
    <script>
        // 语言翻译映射
        const translations = {
            'zh-CN': {
                'task_management_title': '任务管理',
                'task_management_desc': '实时监控后台任务执行情况',
                'back_to_home': '返回首页',
                'log_viewer_btn': '日志查看器',
                'task_list': '任务列表',
                'clear_all_tasks': '清空所有任务',
                'loading': '加载中...',
                'loading_tasks': '正在加载任务列表...',
                'no_tasks': '暂无任务',
                'progress': '进度',
                'status': '状态:',
                'error': '错误:',
                'result': '结果:',
                'detailed_log': '详细日志:',
                'expand': '展开',
                'collapse': '收起',
                'delete': '删除',
                'confirm_delete': '确定要删除这个任务吗？',
                'confirm_clear_all': '确定要清空所有任务吗？',
                'delete_failed': '删除任务失败',
                'clear_failed': '清空任务失败',
                'load_failed': '加载任务失败，请刷新页面重试',
                'not_started': '未开始',
                'log_load_tasks_error': '加载任务失败:',
                'log_delete_task_error': '删除任务失败:',
                'log_clear_tasks_error': '清空任务失败:',
                'copyright': '© 2024 前端杀手 | 模拟游戏元数据管理平台',
                'version': '版本：1.0 beta'
            },
            'en-US': {
                'task_management_title': 'Task Management',
                'task_management_desc': 'Real-time monitoring of background task execution',
                'back_to_home': 'Back to Home',
                'log_viewer_btn': 'Log Viewer',
                'task_list': 'Task List',
                'clear_all_tasks': 'Clear All Tasks',
                'loading': 'Loading...',
                'loading_tasks': 'Loading task list...',
                'no_tasks': 'No tasks',
                'progress': 'Progress',
                'status': 'Status:',
                'error': 'Error:',
                'result': 'Result:',
                'detailed_log': 'Detailed Log:',
                'expand': 'Expand',
                'collapse': 'Collapse',
                'delete': 'Delete',
                'confirm_delete': 'Are you sure you want to delete this task?',
                'confirm_clear_all': 'Are you sure you want to clear all tasks?',
                'delete_failed': 'Failed to delete task',
                'clear_failed': 'Failed to clear tasks',
                'load_failed': 'Failed to load tasks, please refresh the page and try again',
                'not_started': 'Not started',
                'log_load_tasks_error': 'Failed to load tasks:',
                'log_delete_task_error': 'Failed to delete task:',
                'log_clear_tasks_error': 'Failed to clear tasks:',
                'copyright': '© 2024 Frontend Killer | Emulator Game Metadata Management Platform',
                'version': 'Version: 1.0 beta'
            },
            'ja-JP': {
                'task_management_title': 'タスク管理',
                'task_management_desc': 'バックグラウンドタスクの実行状況をリアルタイムで監視',
                'back_to_home': 'ホームに戻る',
                'log_viewer_btn': 'ログビューア',
                'task_list': 'タスクリスト',
                'clear_all_tasks': 'すべてのタスクをクリア',
                'loading': '読み込み中...',
                'loading_tasks': 'タスクリストを読み込んでいます...',
                'no_tasks': 'タスクはありません',
                'progress': '進捗',
                'status': 'ステータス:',
                'error': 'エラー:',
                'result': '結果:',
                'detailed_log': '詳細ログ:',
                'expand': '展開',
                'collapse': '折りたたむ',
                'delete': '削除',
                'confirm_delete': 'このタスクを削除しますか？',
                'confirm_clear_all': 'すべてのタスクをクリアしますか？',
                'delete_failed': 'タスクの削除に失敗しました',
                'clear_failed': 'タスクのクリアに失敗しました',
                'load_failed': 'タスクの読み込みに失敗しました。ページを更新してもう一度お試しください',
                'not_started': '開始されていません',
                'log_load_tasks_error': 'タスクの読み込みに失敗しました:',
                'log_delete_task_error': 'タスクの削除に失敗しました:',
                'log_clear_tasks_error': 'タスクのクリアに失敗しました:',
                'copyright': '© 2024 フロントエンドキラー | エミュレータゲームメタデータ管理プラットフォーム',
                'version': 'バージョン：1.0 beta'
            }
        };
        
        // 获取当前语言设置
        function getCurrentLanguage() {
            return localStorage.getItem('language') || 'zh-CN';
        }
        
        // 设置语言
        function setLanguage(lang) {
            localStorage.setItem('language', lang);
            document.documentElement.lang = lang;
            updateTranslations(lang);
        }
        
        // 更新页面翻译
        function updateTranslations(lang) {
            const translation = translations[lang];
            if (!translation) return;
            
            // 更新标题
            document.title = translation['task_management_title'] + ' - 前端杀手';
            
            // 更新所有带有data-i18n属性的元素
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translation[key]) {
                    element.textContent = translation[key];
                }
            });
        }
        
        // 获取翻译文本
        function getI18nText(key) {
            const lang = getCurrentLanguage();
            return translations[lang][key] || key;
        }
        
        // 初始化语言设置
        function initLanguage() {
            const lang = getCurrentLanguage();
            document.getElementById('languageSelect').value = lang;
            setLanguage(lang);
        }
        
        // 存储展开的任务日志状态
        const expandedLogs = new Set();
        
        // 存储任务状态，用于检测状态变化
        const taskStatusMap = new Map();
        
        // 跨页面通知广播
        const notificationChannel = new BroadcastChannel('taskNotifications');
        
        // 显示通知
        function showNotification(type, title, message) {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <div class="notification-content">
                    <div class="notification-icon">
                        ${type === 'success' ? '✓' : '✗'}
                    </div>
                    <div class="notification-text">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <button class="notification-close" onclick="this.closest('.notification').remove()">×</button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // 广播通知到其他页面
            notificationChannel.postMessage({
                message: title + ': ' + message,
                type: type === 'success' ? 'success' : 'error'
            });
            
            // 3秒后自动关闭
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.animation = 'slideIn 0.3s ease-out reverse';
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);
        }
        
        // 加载任务列表
        function loadTasks() {
            fetch('/api/tasks')
                .then(response => response.json())
                .then(tasks => {
                    const taskList = document.getElementById('taskList');
                    
                    // 检测任务状态变化
                    tasks.forEach(task => {
                        const previousStatus = taskStatusMap.get(task.id);
                        const currentStatus = task.status;
                        
                        // 如果状态从非完成变为完成或失败，显示通知
                        if (previousStatus && previousStatus !== currentStatus && 
                            (currentStatus === 'COMPLETED' || currentStatus === 'FAILED')) {
                            if (currentStatus === 'COMPLETED') {
                                showNotification('success', '任务完成', `${task.description || task.type} 已成功完成`);
                            } else if (currentStatus === 'FAILED') {
                                showNotification('error', '任务失败', `${task.description || task.type} 执行失败`);
                            }
                        }
                        
                        // 更新状态映射
                        taskStatusMap.set(task.id, currentStatus);
                    });
                    
                    if (tasks.length === 0) {
                        taskList.innerHTML = `
                            <div class="text-center text-muted py-8">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-clipboard-check" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                                    <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                                    <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                                </svg>
                                <p class="mt-2">${getI18nText('no_tasks')}</p>
                            </div>
                        `;
                        return;
                    }
                    
                    taskList.innerHTML = tasks.map(task => `
                        <div class="task-card" data-task-id="${task.id}">
                            <div class="task-card-header">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0">${task.description || task.type}</h6>
                                    <span class="status-badge status-${task.status.toLowerCase()}">
                                        ${task.status}
                                    </span>
                                </div>
                                <div class="timestamp mt-1">
                                    ${task.startTime ? new Date(task.startTime).toLocaleString(getCurrentLanguage()) : getI18nText('not_started')}
                                    ${task.endTime ? ` - ${new Date(task.endTime).toLocaleString(getCurrentLanguage())}` : ''}
                                </div>
                            </div>
                            <div class="task-card-body">
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between">
                                        <span class="text-sm text-muted">${getI18nText('progress')}</span>
                                        <span class="text-sm font-medium">${task.progress}%</span>
                                    </div>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: ${task.progress}%" aria-valuenow="${task.progress}" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                </div>
                                
                                <div class="mb-2">
                                    <span class="text-sm font-medium">${getI18nText('status')}</span>
                                    <span class="ms-2 text-sm">${task.message}</span>
                                </div>
                                
                                ${task.processedItems > 0 ? `
                                <div class="mb-2">
                                    <span class="text-sm font-medium">${getI18nText('progress')}:</span>
                                    <span class="ms-2 text-sm">${task.processedItems} / ${task.totalItems}</span>
                                </div>
                                ` : ''}
                                
                                ${task.errorMessage ? `
                                <div class="mb-2 text-danger">
                                    <span class="text-sm font-medium">${getI18nText('error')}</span>
                                    <span class="ms-2 text-sm">${task.errorMessage}</span>
                                </div>
                                ` : ''}
                                
                                ${task.result ? `
                                <div class="mb-2">
                                    <span class="text-sm font-medium">${getI18nText('result')}</span>
                                    <span class="ms-2 text-sm">${task.result}</span>
                                </div>
                                ` : ''}
                                
                                ${task.log ? `
                                <div class="mt-3">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <span class="text-sm font-medium">${getI18nText('detailed_log')}</span>
                                        <button class="btn" onclick="toggleLog(this, '${task.id}')">
                                            ${expandedLogs.has(String(task.id)) ? getI18nText('collapse') : getI18nText('expand')}
                                        </button>
                                    </div>
                                    <div class="log-content mt-1 p-3 rounded border border-gray-200" style="display: ${expandedLogs.has(String(task.id)) ? 'block' : 'none'}; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap;">
                                        ${task.log}
                                    </div>
                                </div>
                                ` : ''}
                                
                                <div class="task-actions">
                                    <button class="btn danger-btn" onclick="deleteTask('${task.id}')">
                                        ${getI18nText('delete')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(error => {
                    console.error(getI18nText('log_load_tasks_error'), error);
                    document.getElementById('taskList').innerHTML = `
                        <div class="text-center text-danger py-8">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-exclamation-triangle" viewBox="0 0 16 16">
                                <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.146.146 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.163.163 0 0 1-.054.06.116.116 0 0 1-.066.017H1.146a.115.115 0 0 1-.066-.017.163.163 0 0 1-.054-.06.176.176 0 0 1 .002-.183L7.884 2.073a.147.147 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z"/>
                                <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995z"/>
                            </svg>
                            <p class="mt-2">${getI18nText('load_failed')}</p>
                        </div>
                    `;
                });
        }
        
        // 删除任务
        function deleteTask(taskId) {
            if (!confirm(getI18nText('confirm_delete'))) {
                return;
            }
            
            fetch(`/api/tasks/${taskId}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    loadTasks();
                } else {
                    alert(getI18nText('delete_failed'));
                }
            })
            .catch(error => {
                console.error(getI18nText('log_delete_task_error'), error);
                alert(getI18nText('delete_failed'));
            });
        }
        
        // 清空所有任务
        function clearAllTasks() {
            if (!confirm(getI18nText('confirm_clear_all'))) {
                return;
            }
            
            fetch('/api/tasks/clear', {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    loadTasks();
                } else {
                    alert(getI18nText('clear_failed'));
                }
            })
            .catch(error => {
                console.error(getI18nText('log_clear_tasks_error'), error);
                alert(getI18nText('clear_failed'));
            });
        }
        
        // 切换日志展开/收起状态
        function toggleLog(button, taskId) {
            // Convert taskId to string to ensure consistent typing
            const taskIdStr = String(taskId);
            const logContent = button.closest('div').nextElementSibling;
            const isVisible = logContent.style.display !== 'none';
            
            if (isVisible) {
                logContent.style.display = 'none';
                button.textContent = getI18nText('expand');
                expandedLogs.delete(taskIdStr);
            } else {
                logContent.style.display = 'block';
                button.textContent = getI18nText('collapse');
                expandedLogs.add(taskIdStr);
            }
        }
        
        // 初始加载任务列表
        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
            loadTasks();
            
            // 每5秒自动刷新一次任务列表
            setInterval(loadTasks, 5000);
            
            // 清空所有任务按钮
            document.getElementById('clearAllBtn').addEventListener('click', clearAllTasks);
            
            // 语言选择器事件监听
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                setLanguage(e.target.value);
                loadTasks();
            });
        });
    </script>
</body>
</html>
