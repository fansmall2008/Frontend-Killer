<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page-title">游戏列表 - 平台管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            background-attachment: fixed;
        }
        
        /* 游戏风格背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(50, 100, 200, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(200, 50, 100, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 游戏风格标题 */
        h1 {
            text-align: center;
            margin: 60px 0 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            color: #fff;
        }
        
        h1::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            animation: scan 4s linear infinite;
        }
        
        @keyframes scan {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: #1a1a2e;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }
        
        .search-toggle-btn {
            padding: 8px 16px;
            background: #1a1a2e;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        
        .search-toggle-btn:hover {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }
        
        .stats {
            font-size: 14px;
            color: #00ffff;
        }
        
        .stats strong {
            color: #ff00ff;
        }
        
        .game-table-container {
            max-height: 600px;
            overflow-y: auto;
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        .game-table-container::-webkit-scrollbar {
            width: 10px;
        }
        
        .game-table-container::-webkit-scrollbar-track {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 8px;
        }
        
        .game-table-container::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 8px;
        }
        
        .game-table-container::-webkit-scrollbar-thumb:hover {
            background: #00cccc;
        }
        
        .pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        .page-size-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-size-selector label {
            font-size: 14px;
            color: #00ffff;
        }
        
        .page-size-selector select {
            padding: 6px 12px;
            border: 1px solid #00ffff;
            border-radius: 4px;
            background: #1a1a2e;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        
        .page-navigation {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-navigation button {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        .page-navigation button:hover {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .page-navigation button:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 14px;
            color: #00ffff;
        }
        
        #mergeDiscsBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        #mergeDiscsBtn:hover:not(:disabled) {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        #mergeDiscsBtn:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }

        #batchEditBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #batchEditBtn:hover:not(:disabled) {
            background: #ff00ff;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        #batchEditBtn:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }
        
        #migrateBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #ff6600;
            border: 1px solid #ff6600;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        #migrateBtn:hover:not(:disabled) {
            background: #ff6600;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.5);
        }
        
        #migrateBtn:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }

        #translateBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        #translateBtn:hover:not(:disabled) {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #translateBtn:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }

        #addGameBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        #addGameBtn:hover {
            background: #00ff00;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        #deleteSelectedBtn {
            padding: 6px 12px;
            background: #1a1a2e;
            color: #f44336;
            border: 2px solid #f44336;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        #deleteSelectedBtn:hover:not(:disabled) {
            background: #f44336;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }

        #deleteSelectedBtn:disabled {
            background: #1a1a2e;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }

        .required {
            color: #f44336;
            font-weight: bold;
            margin-left: 2px;
        }
        
        .game-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            overflow: hidden;
        }
        
        .game-table th,
        .game-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .game-table th {
            background: rgba(26, 26, 46, 0.8);
            font-weight: bold;
            color: #00ffff;
        }
        
        .game-table tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .game-table tr:last-child td {
            border-bottom: none;
        }
        
        .game-table tbody tr {
            cursor: pointer;
        }
        
        .game-table tbody tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
        }
        
        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            margin: 15% auto;
            padding: 20px;
            border: 3px solid #00ffff;
            width: 80%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        
        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            animation: scan 6s linear infinite;
        }
        
        .close {
            color: #ff00ff;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close:hover,
        .close:focus {
            color: #fff;
            text-shadow: 0 0 10px #ff00ff;
        }
        
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #00ffff;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #00ffff;
            border-radius: 4px;
            font-size: 14px;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            position: relative;
        }
        
        .btn {
            padding: 10px 20px;
            border: 2px solid;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #1a1a2e;
            color: #4CAF50;
            border-color: #4CAF50;
        }
        
        .btn-primary:hover {
            background: #4CAF50;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }
        
        .btn-secondary {
            background: #1a1a2e;
            color: #00ffff;
            border-color: #00ffff;
        }
        
        .btn-secondary:hover {
            background: #00ffff;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .action-btn {
            padding: 4px 8px;
            margin-right: 5px;
            border: 2px solid;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        .edit-btn {
            background: #1a1a2e;
            color: #4CAF50;
            border-color: #4CAF50;
        }
        
        .edit-btn:hover {
            background: #4CAF50;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .delete-btn {
            background: #1a1a2e;
            color: #f44336;
            border-color: #f44336;
        }
        
        .delete-btn:hover {
            background: #f44336;
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border: 2px solid;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            box-shadow: 0 0 15px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }
        
        .notification.error {
            background: rgba(244, 67, 54, 0.2);
            border-color: #f44336;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.6);
        }
        
        .notification.info {
            background: rgba(33, 150, 243, 0.2);
            border-color: #2196F3;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.6);
        }

        /* 表格样式调整 */
        .game-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        .game-table th,
        .game-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-table th {
            background-color: rgba(26, 26, 46, 0.8);
            color: #00ffff;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .game-table tr:hover {
            background-color: rgba(0, 255, 255, 0.05);
        }

        /* 搜索区域样式 */
        .search-area {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .search-area h3 {
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .search-input-group {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-input-group input {
            padding: 10px;
            border: 2px solid #00ffff;
            border-radius: 4px;
            font-size: 14px;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
            width: 300px;
            flex: 1;
        }
        
        .search-input-group input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .search-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            align-items: flex-start;
        }
        
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .field-group label {
            color: #00ffff;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .field-group input[type="date"] {
            padding: 8px;
            border: 2px solid #00ffff;
            border-radius: 4px;
            font-size: 14px;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
            width: 100%;
        }
        
        .field-group input[type="date"]:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .field-group select {
            padding: 8px;
            border: 2px solid #00ffff;
            border-radius: 4px;
            font-size: 14px;
            background: #1a1a2e;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
            width: 100%;
            height: 120px;
        }
        
        .field-group select:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .field-group button {
            padding: 10px 20px;
            border: 2px solid;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .field-group button:nth-child(2) {
            background: #1a1a2e;
            color: #4CAF50;
            border-color: #4CAF50;
        }
        
        .field-group button:nth-child(2):hover {
            background: #4CAF50;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }
        
        .field-group button:nth-child(3) {
            background: #1a1a2e;
            color: #f44336;
            border-color: #f44336;
        }
        
        .field-group button:nth-child(3):hover {
            background: #f44336;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.6);
        }
        
        /* 日期范围字段特殊处理 */
        .date-range {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }
        
        .date-range input[type="date"],
        .date-range input[type="number"] {
            padding: 5px;
            background: #1a1a2e;
            color: #00ffff;
            border: 1px solid #00ffff;
            border-radius: 4px;
            width: 100px;
        }
        
        .date-range span {
            color: #00ffff;
            white-space: nowrap;
        }
        
        /* 复选框组样式 */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #00ffff;
            border-radius: 4px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #00ffff;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .checkbox-group input[type="checkbox"] {
            accent-color: #00ffff;
        }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .game-table {
                font-size: 12px;
            }

            .game-table th,
            .game-table td {
                padding: 8px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .pagination-controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .game-table {
                font-size: 14px;
            }
            
            .game-table th,
            .game-table td {
                padding: 8px;
            }
        }
    </style>
    <script src="js/i18n.js"></script>
</head>
<body>
    <div class="container">
        <h1 data-i18n="game_list_title">游戏列表</h1>
        
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()" data-i18n="back-platform">返回平台管理</button>
                <div class="stats" style="margin-left: 20px;">
                    <span data-i18n="platform">平台</span>: <span id="platformName" data-i18n="loading">加载中...</span>
                </div>
            </div>
            <div class="header-right">
                <button class="search-toggle-btn" onclick="toggleSearch()" data-i18n="search">搜索</button>

    <script>
        // 全局变量
        let platformId = 0;
        let subsetId = 0;
        let currentPage = 1;
        let pageSize = 20;
        let totalGames = 0;
        let totalPages = 0;
        
        // 获取URL参数
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        
        // 返回平台管理页面
        function goBack() {
            window.location.href = 'platform-management.html';
        }
        
        // 获取平台信息
        function getPlatformInfo() {
            fetch(`/api/platforms/${platformId}`)
                .then(response => response.json())
                .then(platform => {
                    document.getElementById('platformName').textContent = platform.name;
                })
                .catch(error => console.error('Error fetching platform info:', error));
        }
        
        // 获取子集信息
        function getSubsetInfo() {
            fetch(`/api/temp-subsets/${subsetId}`)
                .then(response => response.json())
                .then(subset => {
                    document.getElementById('platformName').textContent = subset.name;
                })
                .catch(error => console.error('Error fetching subset info:', error));
        }
        
        // 获取平台游戏列表
        function loadGames() {
            console.log('=== loadGames 开始 ===');
            console.log('Loading games for platform:', platformId);
            console.log('Loading games for subset:', subsetId);
            console.log('Current page:', currentPage);
            console.log('Page size:', pageSize);
            
            const tableBody = document.querySelector('#gameTable tbody');
            console.log('tableBody:', tableBody);
            
            if (!tableBody) {
                console.error('tableBody not found!');
                return;
            }
            
            tableBody.innerHTML = '<tr><td colspan="13" style="text-align: center; color: #00ffff;">加载游戏列表中...</td></tr>';
            
            const totalGamesEl = document.getElementById('totalGames');
            const pageInfoEl = document.getElementById('pageInfo');
            
            if (totalGamesEl) {
                totalGamesEl.textContent = '加载中...';
            }
            if (pageInfoEl) {
                pageInfoEl.textContent = '加载中...';
            }
            
            let url = '';
            if (platformId) {
                url = `/api/gamelist/platforms/${platformId}/games?page=${currentPage}&pageSize=${pageSize}`;
            } else if (subsetId) {
                url = `/api/temp-subsets/${subsetId}/games`;
            } else {
                url = `/api/gamelist/games?page=${currentPage}&pageSize=${pageSize}`;
            }
            
            console.log('Fetching URL:', url);
            
            fetch(url)
                .then(response => {
                    console.log('=== 收到响应 ===');
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log('=== 原始响应 ===');
                    console.log('Raw response text:', text);
                    try {
                        if (!text || text.trim() === '') {
                            console.error('Response text is empty');
                            return [];
                        }
                        const parsed = JSON.parse(text);
                        console.log('=== 解析后的JSON ===');
                        console.log('Parsed data:', parsed);
                        return parsed;
                    } catch (e) {
                        console.error('Error parsing JSON:', e);
                        console.error('Response text causing error:', text);
                        return [];
                    }
                })
                .then(data => {
                    console.log('=== 处理数据 ===');
                    console.log('Parsed data:', data);
                    console.log('Data type:', typeof data);
                    console.log('Is array:', Array.isArray(data));
                    
                    let games = [];
                    let totalElements = 0;
                    let totalPagesCount = 0;
                    
                    // 检查返回的数据结构
                    if (Array.isArray(data)) {
                        console.log('=== 数据是数组 ===');
                        // 直接返回游戏数组的情况（如子集游戏）
                        games = data;
                        totalElements = data.length;
                        totalPagesCount = Math.ceil(totalElements / pageSize);
                    } else if (data && typeof data === 'object') {
                        console.log('=== 数据是对象 ===');
                        // 返回包含分页信息的对象的情况
                        if (data.games && Array.isArray(data.games)) {
                            console.log('=== 对象包含games数组 ===');
                            games = data.games;
                            totalElements = data.totalElements || games.length;
                            totalPagesCount = data.totalPages || Math.ceil(totalElements / pageSize);
                        } else {
                            console.error('Data structure not recognized:', data);
                        }
                    } else {
                        console.error('Data is not an array or object:', data);
                    }
                    
                    console.log('Games array:', games);
                    console.log('Games length:', games.length);
                    console.log('Total elements:', totalElements);
                    console.log('Total pages:', totalPagesCount);
                    
                    totalGames = totalElements;
                    totalPages = totalPagesCount;
                    
                    if (totalGamesEl) {
                        totalGamesEl.textContent = totalGames;
                    }
                    if (pageInfoEl) {
                        pageInfoEl.textContent = `第 ${currentPage} 页，共 ${totalPages} 页`;
                    }
                    
                    tableBody.innerHTML = '';
                    
                    if (games.length === 0) {
                        console.log('=== 没有游戏 ===');
                        tableBody.innerHTML = '<tr><td colspan="13" style="text-align: center; color: #888;">该平台暂无游戏</td></tr>';
                    } else {
                        console.log('=== 开始渲染游戏 ===');
                        for (let i = 0; i < games.length; i++) {
                            try {
                                const game = games[i];
                                console.log('Processing game', i, ':', game);
                                
                                const row = document.createElement('tr');
                                row.setAttribute('data-game-id', game.id);
                                row.onclick = function() {
                                    openEditGameModal(game.id);
                                };
                                row.style.cursor = 'pointer';
                                row.innerHTML = `
                                    <td>${game.id || ''}</td>
                                    <td>${game.name || ''}</td>
                                    <td>${game.path || ''}</td>
                                    <td>${game.desc || game.description || ''}</td>
                                    <td>${game.translatedName || ''}</td>
                                    <td>${game.translatedDesc || game.translatedDescription || ''}</td>
                                    <td>${game.developer || ''}</td>
                                    <td>${game.publisher || ''}</td>
                                    <td>${game.genre || game.gameType || ''}</td>
                                    <td>${game.players || game.playerCount || ''}</td>
                                    <td>${game.releasedate || game.releaseDate || ''}</td>
                                    <td>${game.rating || ''}</td>
                                    <td>${game.lang || game.language || ''}</td>
                                `;
                                tableBody.appendChild(row);
                            } catch (e) {
                                console.error('Error processing game:', i, e);
                            }
                        }
                        console.log('=== 游戏渲染完成 ===');
                    }
                    console.log('=== loadGames 正常结束 ===');
                })
                .catch(error => {
                    console.error('=== loadGames 错误 ===');
                    console.error('Error loading games:', error);
                    if (totalGamesEl) {
                        totalGamesEl.textContent = '0';
                    }
                    if (pageInfoEl) {
                        pageInfoEl.textContent = '第 1 页，共 0 页';
                    }
                    tableBody.innerHTML = '<tr><td colspan="13" style="text-align: center; color: #ff0088;">获取游戏列表失败，请重试: ' + error.message + '</td></tr>';
                });
        }

        // 打开迁转模态框
        function openMigrateModal() {
            const selectedGames = getSelectedGameIds();

                alert('请先选择要迁转的游戏');
                return;
            }
            document.getElementById('migrateInfo').textContent = `将迁转 ${selectedGames.length} 个游戏到目标平台`;
            loadPlatformsForMigrate();
            document.getElementById('migrateModal').style.display = 'block';
        }
        
        // 加载平台列表用于迁转
        function loadPlatformsForMigrate() {
            const select = document.getElementById('targetPlatform');
            select.innerHTML = '<option value="">请选择目标平台</option>';
            
            fetch('/api/platforms')
                .then(response => response.json())
                .then(platforms => {
                    platforms.forEach(platform => {
                        if (platform.id != platformId) {
                            const option = document.createElement('option');
                            option.value = platform.id;
                            option.textContent = platform.name;
                            select.appendChild(option);
                        }
                    });
                })
                .catch(error => {
                    console.error('加载平台列表失败:', error);
                    alert('加载平台列表失败');
                });
        }
        
        // 关闭迁转模态框
        function closeMigrateModal() {
            document.getElementById('migrateModal').style.display = 'none';
        }
        
        // 提交迁转
        function submitMigrate() {
            const selectedGames = getSelectedGameIds();
            if (selectedGames.length === 0) {
                alert('请先选择要迁转的游戏');
                return;
            }
            
            const targetPlatformId = document.getElementById('targetPlatform').value;
            if (!targetPlatformId) {
                alert('请选择目标平台');
                return;
            }
            
            const request = {
                gameIds: selectedGames,
                targetPlatformId: parseInt(targetPlatformId)
            };
            
            fetch('/api/gamelist/games/migrate', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(request)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`成功迁转 ${data.migratedCount} 个游戏到目标平台`);
                    closeMigrateModal();
                    loadGames(currentPage);
                } else {
                    alert('迁转失败：' + (data.error || '未知错误'));
                }
            })
            .catch(error => {
                console.error('迁转失败:', error);
                alert('迁转失败：' + error.message);
            });
        }
        
        // 提交批量修改
        function submitBatchEdit() {
            const selectedGames = getSelectedGameIds();
            if (selectedGames.length === 0) {
                alert('请先选择要修改的游戏');
                return;
            }
            
            const updates = {};
            const developer = document.getElementById('batchDeveloper').value.trim();
            const publisher = document.getElementById('batchPublisher').value.trim();
            const genre = document.getElementById('batchGenre').value.trim();
            const players = document.getElementById('batchPlayers').value.trim();
            const lang = document.getElementById('batchLang').value.trim();
            
            if (developer) updates.developer = developer;
            if (publisher) updates.publisher = publisher;
            if (genre) updates.genre = genre;
            if (players) updates.players = players;
            if (lang) updates.lang = lang;
            
            if (Object.keys(updates).length === 0) {
                alert('请至少填写一项要修改的内容');
                return;
            }
            
            const request = {
                gameIds: selectedGames,
                updates: updates
            };
            
            fetch('/api/gamelist/games/batch', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(request)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`成功修改 ${data.updatedCount} 个游戏`);
                    closeBatchEditModal();
                    loadGames(currentPage);
                } else {
                    alert('批量修改失败：' + (data.error || '未知错误'));
                }
            })
            .catch(error => {
                console.error('批量修改失败:', error);
                alert('批量修改失败：' + error.message);
            });
        }
        
        // 获取选中的游戏ID列表

            const checkboxes = document.querySelectorAll('.game-checkbox:checked');
            const gameIds = [];
            checkboxes.forEach(checkbox => {
                gameIds.push(parseInt(checkbox.value));
            });
            return gameIds;
        }

            // 生成媒体文件的相对路径（确保以 ./ 开头）
            function getMediaFullPath(relativePath) {
                if (!relativePath) return null;
                
                // 如果已经是绝对路径或Windows路径，直接返回
                if (relativePath.startsWith('/') || relativePath.match(/^[A-Za-z]:.*/)) {
                    return relativePath;

                // 确保以 ./ 开头
                if (!relativePath.startsWith('./')) {

                downloadBtn.disabled = true;

                // 传递 platformId, gameId 和 platformPath 到后端

        // 搜索游戏
        function searchGames() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            
            // 获取高级搜索参数
            const startYear = document.getElementById('startYear').value;
            const endYear = document.getElementById('endYear').value;
            
            // 获取选中的开发商
            const developers = Array.from(document.querySelectorAll('#developerCheckboxes input:checked')).map(input => input.value);
            
            // 获取选中的游戏类型
            const genres = Array.from(document.querySelectorAll('#genreCheckboxes input:checked')).map(input => input.value);
            
            // 获取选中的玩家数量
            const players = Array.from(document.querySelectorAll('#playersCheckboxes input:checked')).map(input => input.value);
            
            // 获取选中的刮削状态
            const scrapeStatuses = Array.from(document.querySelectorAll('#scrapeStatusCheckboxes input:checked')).map(input => input.value);
            
            // 构建搜索参数
            const searchParams = {
                startYear: startYear,
                endYear: endYear,
                developers: developers,
                genres: genres,
                players: players,
                scrapeStatuses: scrapeStatuses
            };
            
            // 加载游戏列表并应用搜索参数
            loadGames(1, searchTerm, searchParams);
        }

        // 修改loadGames函数以支持搜索参数
        function loadGames(page = 1, searchTerm = null, searchParams = null) {
            const pageSize = document.getElementById('pageSize').value;
            let url = '';
            
            if (platformId && platformId !== 0) {
                url = `/api/gamelist/platforms/${platformId}/games?page=${page}&pageSize=${pageSize}`;
            } else if (subsetId && subsetId !== 0) {
                url = `/api/temp-subsets/${subsetId}/games?page=${page}&pageSize=${pageSize}`;
            } else {
                url = `/api/gamelist/games?page=${page}&pageSize=${pageSize}`;
            }
            
            // 添加搜索参数
            if (searchTerm) {
                url += `&search=${encodeURIComponent(searchTerm)}`;
            }
            
            if (searchParams) {
                if (searchParams.startYear) {
                    url += `&startYear=${encodeURIComponent(searchParams.startYear)}`;
                }
                if (searchParams.endYear) {
                    url += `&endYear=${encodeURIComponent(searchParams.endYear)}`;
                }
                if (searchParams.developers && searchParams.developers.length > 0) {
                    searchParams.developers.forEach(developer => {
                        url += `&developers=${encodeURIComponent(developer)}`;
                    });
                }
                if (searchParams.genres && searchParams.genres.length > 0) {
                    searchParams.genres.forEach(genre => {
                        url += `&genres=${encodeURIComponent(genre)}`;
                    });
                }
                if (searchParams.players && searchParams.players.length > 0) {
                    searchParams.players.forEach(player => {
                        url += `&players=${encodeURIComponent(player)}`;
                    });
                }
                if (searchParams.scrapeStatuses && searchParams.scrapeStatuses.length > 0) {
                    searchParams.scrapeStatuses.forEach(status => {
                        url += `&scrapeStatuses=${encodeURIComponent(status)}`;
                    });
                }
            }
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('=== 搜索结果数据 ===');
                    console.log('Data:', data);
                    
                    // 检查数据结构
                    if (Array.isArray(data)) {
                        // 直接返回游戏数组的情况（如子集游戏）
                        window.currentGames = data;
                        populateDropdowns();
                        displayGames(data, page, Math.ceil(data.length / pageSize), data.length);
                    } else if (data && typeof data === 'object') {
                        // 返回包含分页信息的对象的情况
                        const games = data.games || [];
                        window.currentGames = games;
                        populateDropdowns();
                        displayGames(games, page, data.totalPages || 1, data.totalElements || games.length);
                    } else {
                        // 其他情况
                        console.error('Unexpected data structure:', data);
                        window.currentGames = [];
                        populateDropdowns();
                        displayGames([], page, 1, 0);
                    }
                })
                .catch(error => {
                    console.error('Error loading games:', error);
                    document.getElementById('totalGames').textContent = '0';
                    document.getElementById('pageInfo').textContent = '第 1 页，共 0 页';
                    const tableBody = document.querySelector('#gameTable tbody');
                    if (tableBody) {
                        tableBody.innerHTML = '<tr><td colspan="15" style="text-align: center; color: #ff0088;">获取游戏列表失败，请重试: ' + error.message + '</td></tr>';
                    }
                });
        }

        // 合盘操作
        function mergeDiscs() {
            const checkboxes = document.querySelectorAll('.game-checkbox:checked');
            const selectedGameIds = Array.from(checkboxes).map(checkbox => parseInt(checkbox.value));
            
            if (selectedGameIds.length < 2) {
                alert('请至少选择两个游戏进行合盘操作');
                return;
            }
            
            if (confirm('确定要将选中的游戏合盘吗？这将创建一个新的游戏条目，并删除选中的游戏条目。')) {
                // 发送合盘请求到后端，使用选中的顺序
                const gameIdsToSend = selectedGamesOrder.length > 0 ? selectedGamesOrder : selectedGameIds;
                console.log('合盘游戏ID顺序:', gameIdsToSend);
                
                fetch('/api/gamelist/merge-discs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        gameIds: gameIdsToSend
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        alert('合盘操作成功！');
                        // 清空选择顺序
                        selectedGamesOrder = [];
                        // 刷新页面，保持当前页码
                        loadGames(currentPage);
                    } else {
                        alert('合盘操作失败：' + (data.errorMessage || '未知错误'));
                    }
                })
                .catch(error => {
                    console.error('Error merging discs:', error);
                    alert('合盘操作失败：' + error.message);
                });
            }
        }

        // 切换页面语言

            localStorage.setItem('uiLanguage', lang);
            
            // 设置语言
            if (I18n.setLanguage) {
                I18n.setLanguage(lang);
            }

            window.getI18nText = function(key) {
                return I18n.t(key) || key;
            }

            function applyTranslation(key, element) {
                if (element) {
                    let text = I18n.t(key) || key;
                    element.textContent = text;
                }
            }

            function applyTranslationAttr(key, element, attr) {
                if (element) {
                    let text = I18n.t(key) || key;
                    element.setAttribute(attr, text);
                }
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = I18n.t(key);
                if (translation) {
                    el.textContent = translation;
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                const translation = I18n.t(key);
                if (translation) {
                    el.placeholder = translation;
                }
            });

            document.title = I18n.t('page-title') || 'Game List';
        }

        // 提交翻译请求
        function submitTranslate() {
            const selectedGames = getSelectedGameIds();
            if (selectedGames.length === 0) {
                showNotification('请先选择要翻译的游戏', 'info');
                return;
            }
            
            const sourceLang = document.getElementById('translationSourceLang').value;
            const targetLang = document.getElementById('translationTargetLang').value;
            const apiType = document.getElementById('translationApi').value;
            const translateType = document.getElementById('translationType').value;
            
            if (!apiType) {
                showNotification('请选择翻译API', 'info');
                return;
            }
            
            // 发送翻译请求
            fetch('/api/translation/translate/games', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    gameIds: selectedGames,
                    apiType: apiType,
                    sourceLang: sourceLang,
                    targetLang: targetLang,
                    translateType: translateType,
                    apiKey: localStorage.getItem(apiType + 'ApiKey') || ''
                }),
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showNotification('翻译任务已开始', 'success');
                    document.getElementById('translateModal').style.display = 'none';
                    // 显示翻译进度
                    showTranslationProgress(result.taskId);
                } else {
                    showNotification('翻译任务失败: ' + (result.message || '未知错误'), 'error');
                }
            })
            .catch(error => {
                console.error('Error starting translation:', error);
                showNotification('翻译任务失败: 网络错误', 'error');
            });
        }

                            const progressFill = progressModal.querySelector('#progressFill');
                            const totalGames = progressModal.querySelector('#totalGames');
                            const completedGames = progressModal.querySelector('#completedGames');
                            const successGames = progressModal.querySelector('#successGames');
                            const failedGames = progressModal.querySelector('#failedGames');
                            
                            totalGames.textContent = progress.total;
                            completedGames.textContent = progress.completed;
                            successGames.textContent = progress.success;
                            failedGames.textContent = progress.failed;
                            
                            const percentage = Math.round((progress.completed / progress.total) * 100);
                            progressFill.style.width = percentage + '%';
                            progressFill.textContent = percentage + '%';
                            
                            // 检查任务是否完成
                            if (progress.status === 'completed') {
                                clearInterval(interval);
                                
                                // 显示翻译报告
                                const translationReport = progressModal.querySelector('#translationReport');
                                const reportStatus = progressModal.querySelector('#reportStatus');
                                const reportSuccessCount = progressModal.querySelector('#reportSuccessCount');
                                const reportFailedCount = progressModal.querySelector('#reportFailedCount');
                                const reportSuccessRate = progressModal.querySelector('#reportSuccessRate');
                                
                                translationReport.style.display = 'block';
                                reportStatus.textContent = '已完成';
                                reportSuccessCount.textContent = progress.success;
                                reportFailedCount.textContent = progress.failed;
                                
                                const successRate = progress.total > 0 ? Math.round((progress.success / progress.total) * 100) : 0;
                                reportSuccessRate.textContent = successRate + '%';
                                
                                // 显示错误列表
                                if (progress.errors && progress.errors.length > 0) {
                                    const errorList = progressModal.querySelector('#errorList');
                                    const errorTableBody = progressModal.querySelector('#errorTableBody');
                                    
                                    errorList.style.display = 'block';
                                    errorTableBody.innerHTML = '';
                                    
                                    progress.errors.forEach(error => {
                                        const row = document.createElement('tr');
                                        row.innerHTML = `
                                            <td>${error.gameId}</td>
                                            <td>${error.gameName}</td>
                                            <td>${error.errorType}</td>
                                            <td>${error.errorMessage}</td>
                                        `;
                                        errorTableBody.appendChild(row);
                                    });
                                    
                                    // 创建错误条目子集按钮
                                    const createErrorSubsetBtn = progressModal.querySelector('#createErrorSubsetBtn');
                                    createErrorSubsetBtn.addEventListener('click', function() {
                                        fetch(`/api/translation/create-error-subset/${taskId}`, {
                                            method: 'POST'
                                        })
                                        .then(response => response.json())
                                        .then(result => {
                                            if (result.success) {
                                                showNotification('错误条目子集创建成功', 'success');
                                            } else {
                                                showNotification('错误条目子集创建失败: ' + (result.message || '未知错误'), 'error');
                                            }
                                        })
                                        .catch(error => {
                                            console.error('Error creating error subset:', error);
                                            showNotification('错误条目子集创建失败: 网络错误', 'error');
                                        });
                                    });
                                }
                            }
                        } else {
                            clearInterval(interval);
                            showNotification('获取翻译进度失败: ' + (result.message || '未知错误'), 'error');
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching translation progress:', error);
                        clearInterval(interval);
                        showNotification('获取翻译进度失败: 网络错误', 'error');
                    });
            }, 2000);
        }
        
        // 获取选中的游戏ID列表
        function getSelectedGameIds() {
            const checkboxes = document.querySelectorAll('.game-checkbox:checked');
            const gameIds = [];
            checkboxes.forEach(checkbox => {
                gameIds.push(parseInt(checkbox.value));
            });
            return gameIds;
        }
        
        // 打开分离模态框
        function openSeparationModal(gameId) {
            // 这里可以实现分离功能的模态框
            alert('分离功能开发中');
        }
        
        // 查看游戏详情
        function viewGameDetails(gameId) {
            // 这里可以实现查看游戏详情的功能
            openEditGameModal(gameId);
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            const editModal = document.getElementById('editGameModal');
            const addModal = document.getElementById('addGameModal');
            const batchEditModal = document.getElementById('batchEditModal');
            const migrateModal = document.getElementById('migrateModal');
            const translateModal = document.getElementById('translateModal');
            if (event.target == editModal) {
                editModal.style.display = 'none';
            }
            if (event.target == addModal) {
                addModal.style.display = 'none';
            }
            if (event.target == batchEditModal) {
                batchEditModal.style.display = 'none';
            }
            if (event.target == migrateModal) {
                migrateModal.style.display = 'none';
            }
            if (event.target == translateModal) {
                translateModal.style.display = 'none';
            }
        };
    </script>
</body>
